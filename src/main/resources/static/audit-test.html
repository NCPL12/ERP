<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Order Audit Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1>Sales Order Audit System Test</h1>
        <p class="text-muted">Test the audit trail functionality for Sales Orders</p>

        <!-- Test Audit API Endpoints -->
        <div class="test-section">
            <h3>Test Audit API Endpoints</h3>
            
            <div class="row">
                <div class="col-md-6">
                    <button class="btn btn-primary" onclick="testGetAllAudits()">Get All Audit Logs</button>
                </div>
                <div class="col-md-6">
                    <button class="btn btn-info" onclick="testGetAuditByAction()">Get Logs by Action</button>
                </div>
            </div>
            
            <div class="row mt-2">
                <div class="col-md-6">
                    <input type="text" id="salesOrderId" class="form-control" placeholder="Sales Order ID">
                    <button class="btn btn-secondary mt-2" onclick="testGetAuditBySalesOrder()">Get Logs by Sales Order</button>
                </div>
                <div class="col-md-6">
                    <input type="text" id="performedBy" class="form-control" placeholder="Username">
                    <button class="btn btn-secondary mt-2" onclick="testGetAuditByUser()">Get Logs by User</button>
                </div>
            </div>
            
            <div id="apiResult" class="result"></div>
        </div>

        <!-- Test Search Functionality -->
        <div class="test-section">
            <h3>Test Search Functionality</h3>
            
            <div class="row">
                <div class="col-md-3">
                    <input type="text" id="searchSalesOrderId" class="form-control" placeholder="Sales Order ID">
                </div>
                <div class="col-md-3">
                    <input type="text" id="searchPerformedBy" class="form-control" placeholder="Performed By">
                </div>
                <div class="col-md-2">
                    <select id="searchAction" class="form-control">
                        <option value="">All Actions</option>
                        <option value="CREATE">CREATE</option>
                        <option value="UPDATE">UPDATE</option>
                        <option value="ARCHIVE">ARCHIVE</option>
                        <option value="UNARCHIVE">UNARCHIVE</option>
                        <option value="DELETE_ITEM">DELETE_ITEM</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="date" id="startDate" class="form-control">
                </div>
                <div class="col-md-2">
                    <input type="date" id="endDate" class="form-control">
                </div>
            </div>
            
            <button class="btn btn-success mt-3" onclick="testSearch()">Search Audit Logs</button>
            
            <div id="searchResult" class="result"></div>
        </div>

        <!-- Display Audit Logs -->
        <div class="test-section">
            <h3>Recent Audit Logs</h3>
            <button class="btn btn-info" onclick="loadRecentAudits()">Load Recent Logs</button>
            
            <div id="auditTableContainer" class="mt-3"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/ncpl-sales/api/audit/sales-order';

        function showResult(elementId, message, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.innerHTML = `
                <div class="alert ${isSuccess ? 'alert-success' : 'alert-danger'}">
                    ${message}
                </div>
            `;
        }

        async function testGetAllAudits() {
            try {
                const response = await fetch(`${API_BASE}/all`);
                const data = await response.json();
                showResult('apiResult', `Successfully retrieved ${data.length} audit logs`, true);
                console.log('All audit logs:', data);
            } catch (error) {
                showResult('apiResult', `Error: ${error.message}`, false);
            }
        }

        async function testGetAuditByAction() {
            try {
                const action = 'CREATE'; // Test with CREATE action
                const response = await fetch(`${API_BASE}/by-action?action=${action}`);
                const data = await response.json();
                showResult('apiResult', `Found ${data.length} logs for action: ${action}`, true);
                console.log('Logs by action:', data);
            } catch (error) {
                showResult('apiResult', `Error: ${error.message}`, false);
            }
        }

        async function testGetAuditBySalesOrder() {
            const salesOrderId = document.getElementById('salesOrderId').value;
            if (!salesOrderId) {
                showResult('apiResult', 'Please enter a Sales Order ID', false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/by-so-id?salesOrderId=${salesOrderId}`);
                const data = await response.json();
                showResult('apiResult', `Found ${data.length} logs for Sales Order: ${salesOrderId}`, true);
                console.log('Logs by sales order:', data);
            } catch (error) {
                showResult('apiResult', `Error: ${error.message}`, false);
            }
        }

        async function testGetAuditByUser() {
            const performedBy = document.getElementById('performedBy').value;
            if (!performedBy) {
                showResult('apiResult', 'Please enter a username', false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/by-user?performedBy=${performedBy}`);
                const data = await response.json();
                showResult('apiResult', `Found ${data.length} logs for user: ${performedBy}`, true);
                console.log('Logs by user:', data);
            } catch (error) {
                showResult('apiResult', `Error: ${error.message}`, false);
            }
        }

        async function testSearch() {
            const salesOrderId = document.getElementById('searchSalesOrderId').value;
            const performedBy = document.getElementById('searchPerformedBy').value;
            const action = document.getElementById('searchAction').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            const params = new URLSearchParams({
                salesOrderId: salesOrderId,
                performedBy: performedBy,
                action: action,
                startDate: startDate,
                endDate: endDate
            });

            try {
                const response = await fetch(`${API_BASE}/search?${params.toString()}`);
                const data = await response.json();
                showResult('searchResult', `Search completed. Found ${data.length} matching logs`, true);
                console.log('Search results:', data);
            } catch (error) {
                showResult('searchResult', `Error: ${error.message}`, false);
            }
        }

        async function loadRecentAudits() {
            try {
                const response = await fetch(`${API_BASE}/all`);
                const audits = await response.json();
                
                const tableHtml = `
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Sales Order ID</th>
                                <th>Action</th>
                                <th>Performed By</th>
                                <th>Date & Time</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${audits.slice(0, 10).map(audit => `
                                <tr>
                                    <td>${audit.id}</td>
                                    <td>${audit.salesOrderId}</td>
                                    <td><span class="badge bg-primary">${audit.action}</span></td>
                                    <td>${audit.performedBy}</td>
                                    <td>${new Date(audit.actionPerformed).toLocaleString()}</td>
                                    <td>${audit.description}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                
                document.getElementById('auditTableContainer').innerHTML = tableHtml;
            } catch (error) {
                document.getElementById('auditTableContainer').innerHTML = 
                    `<div class="alert alert-danger">Error loading audit logs: ${error.message}</div>`;
            }
        }

        // Set default dates for search
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
            document.getElementById('endDate').value = today;
        });
    </script>
</body>
</html>
